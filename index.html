<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتائج الطلاب</title>
  <link rel="icon" href="https://img.icons8.com/?size=100&id=WxWh18GEkDgr&format=png&color=000000" type="image/png">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <h1>نتائج الطلاب</h1>
  <div class="top-controls">
    <button id="adminBtn" class="admin-btn">لوحة الإدارة</button>
    <select id="sortSelect" class="sort-select">
      <option value="default">الترتيب الافتراضي</option>
      <option value="name">ترتيب حسب الاسم</option>
      <option value="markHigh">الأعلى درجات</option>
      <option value="markLow">الأقل درجات</option>
      <option value="id">ترتيب حسب ID</option>
    </select>
  </div>
  <div id="students" class="students-container"></div>

  <div id="adminModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h2>لوحة الإدارة</h2>
          <p class="modal-subtitle">إضافة - تعديل - حذف بيانات الطلاب - وأي ابن متناكه أخر</p>
        </div>
        <button id="closeModal" class="close-btn">✖</button>
      </div>
      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="addTab">إضافة</button>
        <button class="tab-btn" data-tab="editTab">تعديل</button>
        <button class="tab-btn" data-tab="deleteTab">حذف</button>
      </div>
      <div class="modal-body">
        <div id="addTab" class="tab-content active">
          <form id="addForm" class="add-form">
            <div class="form-row">
              <input type="text" class="table-input" name="id" placeholder="ID" required>
              <input type="text" class="table-input" name="name" placeholder="الاسم" required>
              <input type="number" class="table-input" name="mark" placeholder="الدرجة" required>
              <input type="url" class="table-input" name="img" placeholder="رابط الصورة" required>
              <button type="submit" class="primary-btn">حفظ الطالب</button>
            </div>
          </form>
          <div class="table-wrapper">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>الاسم</th>
                  <th>الدرجة</th>
                  <th>الصورة</th>
                  <th>حذف</th>
                </tr>
              </thead>
              <tbody id="addStudentsTable"></tbody>
            </table>
          </div>
        </div>

        <div id="editTab" class="tab-content">
          <div class="action-box">
            <div class="action-title">اختر طريقة التعديل</div>
            <div class="action-buttons">
              <button id="editShowAllBtn" class="secondary-btn">عرض الكل</button>
              <button id="editSearchBtn" class="secondary-btn">بحث</button>
            </div>
          </div>
          <div id="editSearchBox" class="search-box hidden">
            <div class="search-row">
              <select id="editSearchType" class="input">
                <option value="id">بحث بـ ID</option>
                <option value="name">بحث بالاسم</option>
                <option value="mark">بحث بالدرجة</option>
              </select>
              <input id="editSearchInput" class="input" placeholder="البحث">
              <button id="editSearchRunBtn" class="primary-btn">بحث</button>
            </div>
          </div>
          <div class="list-wrapper" id="editList"></div>
        </div>

        <div id="deleteTab" class="tab-content">
          <div class="action-box">
            <div class="action-title">اختر طريقة الحذف</div>
            <div class="action-buttons">
              <button id="deleteShowAllBtn" class="secondary-btn">عرض الكل</button>
              <button id="deleteSearchBtn" class="secondary-btn">بحث</button>
            </div>
          </div>
          <div id="deleteSearchBox" class="search-box hidden">
            <div class="search-row">
              <select id="deleteSearchType" class="input">
                <option value="id">بحث بـ ID</option>
                <option value="name">بحث بالاسم</option>
                <option value="mark">بحث بالدرجة</option>
              </select>
              <input id="deleteSearchInput" class="input" placeholder="البحث">
              <button id="deleteSearchRunBtn" class="primary-btn">بحث</button>
            </div>
          </div>
          <div class="list-wrapper" id="deleteList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
